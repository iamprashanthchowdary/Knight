# Knight's registered nginx log format.
#
# This is entirely OPTIONAL. Knight auto-detects it per line and falls back to
# the standard nginx "combined" format for anything that isn't this -- so
# pointing Knight at whatever your nginx already logs today keeps working with
# zero changes. Adopting this format is purely additive: you get it upgraded
# on the fly, with no Knight-side config, no migration, and no need to touch
# already-rotated log files.
#
# What you get by adopting it:
#   - The REAL client IP behind a proxy/load balancer, via X-Forwarded-For
#     (Knight prefers this field's first hop over $remote_addr automatically).
#     Without this, every request behind a proxy looks like it came from one
#     IP -- your proxy's -- and per-visitor analytics are meaningless.
#   - request_time / upstream_response_time captured for future latency
#     reporting, at zero extra cost (nginx already computes these internally).
#   - A single unambiguous, versioned schema -- immune to nginx log_format
#     customizations elsewhere breaking Knight's parsing.
#
# INSTALL (one-time, per nginx host):
#   1. Copy this file to, e.g., /etc/nginx/conf.d/knight-log-format.conf
#      (must be included somewhere in the http{} context -- conf.d/ is
#      auto-included on Debian/Ubuntu's default nginx.conf).
#   2. In EACH server{} block you want Knight to observe, change:
#        access_log /var/log/nginx/access.log;
#      to:
#        access_log /var/log/nginx/access.log knight;
#   3. Validate and reload -- never reload without testing first:
#        sudo nginx -t && sudo systemctl reload nginx
#
# Nothing else changes: logrotate config, log paths, and Knight's own
# `access_log` setting in config.json all stay exactly as they are.

log_format knight escape=json
    '{'
        '"v":1,'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"forwarded_for":"$http_x_forwarded_for",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"host":"$host"'
    '}';
